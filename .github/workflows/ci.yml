name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Type checking
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=moderate || true

  dco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO Sign-Off Check
        run: |
          echo "Checking DCO sign-off on commits..."
          COMMITS=$(git log --format='%H' origin/main..HEAD 2>/dev/null || git log --format='%H' -10)
          FAILED=0
          for COMMIT in $COMMITS; do
            MSG=$(git log --format='%B' -n 1 $COMMIT)
            if ! echo "$MSG" | grep -q "Signed-off-by:"; then
              echo "❌ Commit $COMMIT missing DCO sign-off"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "All commits must include a DCO sign-off line."
            echo "Use: git commit --signoff -S -m 'your message'"
            exit 1
          fi
          echo "✅ All commits have DCO sign-off"
